<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KMZ → GPX</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
    --bg: #060a13;
    --bg2: #0b1120;
    --card: #0d1424;
    --border: #1a2740;
    --border-light: #243352;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-muted: #4a5e7a;
    --accent: #00e5b0;
    --accent-dim: rgba(0,229,176,0.08);
    --accent-mid: rgba(0,229,176,0.25);
    --success: #22c55e;
    --danger: #ef4444;
    --warning: #f59e0b;
    --info: #38bdf8;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
    overflow-x: hidden;
}
.bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: radial-gradient(circle, rgba(0,229,176,0.035) 1px, transparent 1px);
    background-size: 28px 28px;
}
.bg-blob {
    position: fixed; border-radius: 50%; filter: blur(120px); z-index: 0; pointer-events: none;
}
.bg-blob-1 {
    width: 600px; height: 600px; top: -200px; left: -100px;
    background: rgba(0,229,176,0.04);
    animation: blobDrift 25s ease-in-out infinite alternate;
}
.bg-blob-2 {
    width: 500px; height: 500px; bottom: -150px; right: -100px;
    background: rgba(56,189,248,0.03);
    animation: blobDrift 30s ease-in-out infinite alternate-reverse;
}
@keyframes blobDrift {
    0% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(60px, 40px) scale(1.1); }
    100% { transform: translate(-30px, 70px) scale(0.95); }
}
.container {
    position: relative; z-index: 1;
    max-width: 1080px; margin: 0 auto;
    padding: 48px 24px 80px;
}
header { margin-bottom: 36px; }
        .logo { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
        .logo-icon {
            width: 44px; height: 44px; border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #00b894);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: #060a13; flex-shrink: 0;
            box-shadow: 0 0 24px rgba(0,229,176,0.2);
        }
        .logo-text {
            font-size: 28px; font-weight: 900; letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--text), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo-icon a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        .logo-icon img {
            display: block; /* removes inline baseline weirdness */
        }
.subtitle {
    color: var(--text-muted); font-size: 15px; margin-left: 58px; margin-top: -4px;
}
.input-section {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 32px; margin-bottom: 32px;
}
.input-row {
    display: flex; gap: 16px; align-items: center;
}
#fileInput {
    flex: 1;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px 20px; transition: border-color 0.2s;
    color: var(--text); font-family: var(--mono); font-size: 15px;
}
#fileInput:hover { border-color: var(--border-light); }
#fileInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
    outline: none;
}
.convert-btn {
    background: linear-gradient(135deg, var(--accent), #00b894);
    color: #060a13; border: none; border-radius: 8px;
    padding: 16px 32px; font-family: var(--sans); font-size: 16px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
    box-shadow: 0 4px 14px rgba(0,229,176,0.3);
}
.convert-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(0,229,176,0.4);
}
.convert-btn:active { transform: translateY(0); }
.status {
    margin-top: 20px; padding: 16px; border-radius: 8px;
    font-family: var(--mono); font-size: 14px;
    display: none;
}
.status.success { background: rgba(34,197,94,0.15); border: 1px solid var(--success); color: var(--success); }
.status.error   { background: rgba(239,68,68,0.15);  border: 1px solid var(--danger);  color: var(--danger); }

/* ── Preview section ── */
.preview-section {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 32px; margin-bottom: 32px;
    display: none;
}
.preview-section.visible { display: block; }

.section-label {
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 24px;
    display: flex; align-items: center; gap: 10px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.preview-table {
    width: 100%; border-collapse: collapse;
}
.preview-table th {
    text-align: left; font-size: 11px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--text-muted);
    padding: 8px 16px; border-bottom: 1px solid var(--border);
}
.preview-table td {
    padding: 10px 16px; border-bottom: 1px solid rgba(26,39,64,0.7);
    vertical-align: middle;
}
.preview-table tbody tr:last-child td { border-bottom: none; }
.preview-table tbody tr:hover td { background: var(--accent-dim); }

.icon-cell {
    display: flex; align-items: center; gap: 14px;
}
.icon-cell img {
    width: 40px; height: 40px; flex-shrink: 0;
    image-rendering: pixelated;
}
.icon-img-placeholder {
    width: 40px; height: 40px; flex-shrink: 0;
    background: var(--bg2); border: 1px dashed var(--border-light);
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--text-muted);
}
.icon-label {}
.icon-name {
    font-family: var(--mono); font-size: 13px; color: var(--text);
}
.icon-sub {
    font-size: 11px; color: var(--text-muted); margin-top: 2px;
    display: flex; align-items: center; gap: 6px;
}
.color-swatch {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 2px; border: 1px solid rgba(255,255,255,0.15);
    vertical-align: middle; flex-shrink: 0;
}

.arrow-col {
    text-align: center; color: var(--accent); font-size: 18px;
    width: 44px; opacity: 0.7;
}

/* OsmAnd shaped icon backgrounds */
.osmand-bg {
    width: 40px; height: 40px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    position: relative;
}
.osmand-bg.shape-circle  { border-radius: 50%; }
.osmand-bg.shape-square  { border-radius: 5px; }
.osmand-bg.shape-octagon {
    clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%,
                       70% 100%, 30% 100%, 0% 70%, 0% 30%);
}
.osmand-bg img {
    width: 24px; height: 24px;
}
.osmand-bg .fallback-q {
    font-size: 16px; color: rgba(255,255,255,0.7);
}

/* ── OsmAnd editable cell ── */
.osm-edit-wrap {
    display: flex; align-items: flex-start; gap: 14px;
}
.osm-controls {
    display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 0;
}
.osm-name-row {
    display: flex; gap: 6px; align-items: center;
}
.osm-name-input {
    flex: 1; min-width: 0;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 9px;
    color: var(--text); font-family: var(--mono); font-size: 12px;
    transition: border-color 0.15s;
}
.osm-name-input:focus { border-color: var(--accent); outline: none; }
.osm-color-row {
    display: flex; gap: 6px; align-items: center;
}
.osm-colorpicker {
    width: 32px; height: 28px; padding: 2px 3px;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg2); cursor: pointer; flex-shrink: 0;
}
.osm-colorpicker::-webkit-color-swatch-wrapper { padding: 0; }
.osm-colorpicker::-webkit-color-swatch { border: none; border-radius: 3px; }
.osm-hex-input {
    width: 80px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 9px;
    color: var(--text); font-family: var(--mono); font-size: 12px;
    transition: border-color 0.15s;
}
.osm-hex-input:focus { border-color: var(--accent); outline: none; }
.osm-hex-input.invalid { border-color: var(--danger); }
.osm-shape-row {
    display: flex; gap: 4px;
}
.osm-shape-btn {
    padding: 3px 9px; font-size: 11px; font-weight: 600;
    border: 1px solid var(--border); border-radius: 5px;
    background: var(--bg2); color: var(--text-muted);
    cursor: pointer; transition: all 0.15s; font-family: var(--sans);
}
.osm-shape-btn:hover { border-color: var(--border-light); color: var(--text-dim); }
.osm-shape-btn.active {
    background: var(--accent-dim); border-color: var(--accent);
    color: var(--accent);
}
.osm-reset-btn {
    padding: 4px 8px; font-size: 13px; line-height: 1;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg2); color: var(--text-muted);
    cursor: pointer; transition: all 0.15s; flex-shrink: 0;
}
.osm-reset-btn:hover { border-color: var(--warning); color: var(--warning); }

/* clickable preview bubble */
.osmand-bg.pickable { cursor: pointer; }
.osmand-bg.pickable:hover { filter: brightness(1.25); }

/* browse button */
.osm-browse-btn {
    padding: 4px 8px; font-size: 13px; line-height: 1;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg2); color: var(--text-muted);
    cursor: pointer; transition: all 0.15s; flex-shrink: 0;
}
.osm-browse-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── Icon picker modal ── */
.ip-overlay {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
}
.ip-overlay.open { display: flex; }
.ip-modal {
    background: var(--card); border: 1px solid var(--border-light);
    border-radius: 14px; width: min(820px, 95vw);
    max-height: 80vh; display: flex; flex-direction: column;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    overflow: hidden;
}
.ip-header {
    display: flex; align-items: center; gap: 12px;
    padding: 18px 20px; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}
.ip-title {
    font-size: 14px; font-weight: 700; color: var(--text-dim);
    white-space: nowrap;
}
.ip-search {
    flex: 1; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 7px; padding: 7px 12px;
    color: var(--text); font-family: var(--mono); font-size: 13px;
}
.ip-search:focus { border-color: var(--accent); outline: none; }
.ip-close {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    color: var(--text-muted); padding: 4px 9px; cursor: pointer; font-size: 14px;
    flex-shrink: 0;
}
.ip-close:hover { border-color: var(--danger); color: var(--danger); }
.ip-status {
    padding: 24px; text-align: center;
    color: var(--text-muted); font-size: 13px; font-family: var(--mono);
}
.ip-status:empty { display: none; }
.ip-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(76px, 1fr));
    gap: 4px; padding: 12px; overflow-y: auto; flex: 1;
}
.ip-card {
    display: flex; flex-direction: column; align-items: center;
    gap: 5px; padding: 8px 4px; border-radius: 8px;
    border: 1px solid transparent;
    cursor: pointer; transition: all 0.12s; text-align: center;
    background: var(--bg2);
}
.ip-card:hover { border-color: var(--border-light); background: var(--bg); }
.ip-card.selected { border-color: var(--accent); background: var(--accent-dim); }
.ip-card img {
    width: 32px; height: 32px; object-fit: contain;
}
.ip-card span {
    font-family: var(--mono); font-size: 9px; color: var(--text-muted);
    word-break: break-all; line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
}
.ip-card.selected span { color: var(--accent); }

/* mark overridden rows */
tr.overridden td { background: rgba(0,229,176,0.04); }

/* count badge */
.count-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 20px; height: 20px; padding: 0 6px;
    background: var(--accent-mid); color: var(--accent);
    border-radius: 10px; font-size: 11px; font-weight: 700;
    font-family: var(--mono); margin-left: 8px;
}
</style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>

    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">
                <a href="https://mariush444.github.io/Osmand-tools/">
                <img src="https://avatars.githubusercontent.com/u/66887280?v=4&size=64" alt="Main Page" style="width:30px;height:30px;"></a>
                </div>
                <!-- div class="logo-icon"></div -->
                <div>
                    <div class="logo-text">KMZ to GPX with Osmand's icons</div>
                    <div class="subtitle">Strict OsmAnd-compatible converter</div>
                </div>
            </div>
        </header>

        <div class="input-section">
            <div class="input-row">
                <input type="file" id="fileInput" accept=".kmz" onchange="loadPreview()">
                <button class="convert-btn" onclick="convert()">Convert KMZ → GPX</button>
            </div>
            <div id="status" class="status"></div>
        </div>

        <!-- Preview section, shown after file is selected -->
        <div class="preview-section" id="previewSection">
            <div class="section-label" id="previewLabel">Icon conversion preview</div>
            <table class="preview-table">
                <thead>
                    <tr>
                        <th>Google Maps icon</th>
                        <th class="arrow-col"></th>
                        <th>OsmAnd icon</th>
                        <th style="width:80px; text-align:right; padding-right:4px;">Used</th>
                    </tr>
                </thead>
                <tbody id="previewBody"></tbody>
            </table>
        </div>
    </div>

<script>
const KMLCOLOR = "KMLCOLOR";
const TrackTransparency = "ff";

// ── OsmAnd icon dictionary (unchanged) ──────────────────────────────────────
const iconDictionary = {
"unknown":["special_symbol_question_mark","000001","octagon"],
"503":["special_star","d00d0d","circle"],
"1501":["special_bookmark","eecc22","circle"],
"1502":["special_star","eecc22","circle"],
"1504":["air_transport","10c0f0","circle"],
"1507":["shop_pet","d00d0d","circle"],
"1510":["amenity_atm","10c0f0","square"],
"1525":["water_transport","a71de1","octagon"],
"1528":["bridge_structure_arch","d00d0d","circle"],
"1535":["special_photo_camera","eecc22","circle"],
"1538":["special_wagon","a71de1","square"],
"1539":["shop_car_repair","a71de1","circle"],
"1541":["special_symbol_exclamation_mark","ff0000","octagon"],
"1546":["place_city","d00d0d","circle"],
"1564":["special_symbol_exclamation_mark","ff0000","octagon"],
"1574":["special_flag_stroke","eecc22","circle"],
"1577":["restaurants","10c0f0","square"],
"1578":["shop_supermarket","10c0f0","circle"],
"1581":["fuel","a71de1","circle"],
"1596":["special_trekking","eecc22","circle"],
"1598":["historic_castle","d00d0d","circle"],
"1602":["tourism_hotel","1010a0","circle"],
"1603":["special_house","d00d0d","circle"],
"1608":["tourism_information","10c0f0","square"],
"1624":["amenity_hospital","d00d0d","circle"],
"1636":["tourism_museum","eecc22","circle"],
"1644":["parking","a71de1","circle"],
"1650":["tourism_picnic_site","eecc22","circle"],
"1655":["amenity_police","1010a0","circle"],
"1657":["amenity_police","1010a0","circle"],
"1670":["religion_christian","d00d0d","circle"],
"1673":["religion_muslim","d00d0d","circle"],
"1685":["shop_supermarket","10c0f0","square"],
"1703":["amenity_drinking_water","10c0f0","square"],
"1710":["special_arrow_up_and_down","10c0f0","circle"],
"1723":["tourism_viewpoint","d90000","octagon"],
"1729":["tourism_viewpoint","d00d0d","circle"],
"1733":["amenity_toilets","10c0f0","circle"],
"1739":["special_symbol_plus","1010a0","circle"],
"1765":["tourism_camp_site","1010a0","circle"],
"1767":["natural_cave_entrance","d00d0d","circle"],
"1803":["special_arrow_right_arrow_left","d00d0d","circle"],
"1879":["amenity_biergarten","10c0f0","circle"],
"1892":["waterfall","d00d0d","circle"],
"1899":["special_star",KMLCOLOR,"circle"]
};

// ── Per-row user overrides: key "iconId|kmlColor" → {name, color, shape} ────
const userOverrides = {};

function getDefaultOsmand(iconId, kmlColor) {
    const dictKey = iconDictionary[iconId] ? iconId : "unknown";
    const e = iconDictionary[dictKey];
    return { name: e[0], color: e[1] === KMLCOLOR ? kmlColor : e[1], shape: e[2] };
}

function getOsmand(iconId, kmlColor) {
    const key = `${iconId}|${kmlColor}`;
    return userOverrides[key] || getDefaultOsmand(iconId, kmlColor);
}

// ── Google Maps icon names (icon-id → slug used in the mt.google.com URL) ──
// Two special cases handled separately: 1739 (measle) and 1899 (pin)
const googleIconNames = {
"503":  "star",
"1501": "bookmark",
"1502": "star",
"1504": "airports",
"1507": "paw",
"1510": "atm",
"1525": "ferry",
"1528": "bridge",
"1535": "camera",
"1538": "shopping-cart",
"1539": "car-repair",
"1541": "caution",
"1546": "city",
"1564": "caution",
"1574": "flag",
"1577": "restaurant",
"1578": "grocery",
"1581": "gas-station",
"1596": "hiker",
"1598": "castle",
"1602": "lodging",
"1603": "home",
"1608": "info",
"1624": "hospitals",
"1636": "museum",
"1644": "parking-lot",
"1650": "picnic",
"1655": "police",
"1657": "post-office",
"1670": "church",
"1673": "mosque",
"1685": "shopping-bag",
"1703": "water",
"1710": "elevator",
"1723": "mountains",
"1729": "mountains",
"1733": "toilet",
"1739": "blank-measle",   // special — measle container
"1765": "camping",
"1767": "cave",
"1803": "arrows",
"1879": "bar",
"1892": "waterfall",
"1899": "blank-shape_pin" // special — pin container
};

// Build OsmAnd raw-GitHub PNG URL
function osmandIconUrl(iconName) {
    // SVG = white icon, correct for display on colored background (as OsmAnd shows it)
    return `https://raw.githubusercontent.com/osmandapp/OsmAnd-resources/master/rendering_styles/style-icons/poi-icons-svg/mx_${iconName}.svg`;
}

// ── Preview loader ───────────────────────────────────────────────────────────
// Revoked on next load to avoid memory leaks
let _blobUrls = [];

async function loadPreview() {
    const file    = document.getElementById("fileInput").files[0];
    const section = document.getElementById("previewSection");
    const body    = document.getElementById("previewBody");
    const label   = document.getElementById("previewLabel");

    section.classList.remove("visible");
    body.innerHTML = "";
    _blobUrls.forEach(URL.revokeObjectURL, URL);
    _blobUrls = [];

    if (!file) return;

    try {
        const zip     = await JSZip.loadAsync(file);
        const kmlText = await zip.file("doc.kml").async("text");
        const xml     = new DOMParser().parseFromString(kmlText, "text/xml");

        // ── Extract embedded icon images from the KMZ as blob URLs ───────────
        // KMZ stores rendered colored icons in images/icon-N.png — use those
        // directly instead of trying to reconstruct Google's CDN URL format.
        const imageBlobs = {};
        for (const [path, entry] of Object.entries(zip.files)) {
            if (!entry.dir && /^images\/.+\.(png|jpg|gif)$/i.test(path)) {
                const blob = await entry.async("blob");
                const url  = URL.createObjectURL(blob);
                imageBlobs[path] = url;
                _blobUrls.push(url);
            }
        }

        // ── Build Style id → icon href lookup ────────────────────────────────
        const styleHref = {}; // style-id → "images/icon-N.png"
        xml.querySelectorAll("Style").forEach(s => {
            const id   = s.getAttribute("id");
            const href = s.querySelector("IconStyle > Icon > href")?.textContent?.trim();
            if (id && href) styleHref[id] = href;
        });

        // ── Build StyleMap id → normal Style id ──────────────────────────────
        const smNormal = {}; // styleMap-id → style-id
        xml.querySelectorAll("StyleMap").forEach(sm => {
            const id = sm.getAttribute("id");
            sm.querySelectorAll("Pair").forEach(pair => {
                if (pair.querySelector("key")?.textContent === "normal") {
                    const url = pair.querySelector("styleUrl")?.textContent?.replace(/^#/, "");
                    if (url) smNormal[id] = url;
                }
            });
        });

        // ── Collect unique styles used by waypoint Placemarks ────────────────
        const styleMap = new Map(); // "iconId|kmlColor" → { iconId, kmlColor, href, count }

        xml.querySelectorAll("Placemark").forEach(pm => {
            if (pm.querySelector("LineString")) return; // skip tracks

            const styleUrl = (pm.querySelector("styleUrl")?.textContent || "").replace(/^#/, "");
            const parts    = styleUrl.split("-");
            if (parts.length < 3 || parts[0] !== "icon") return;

            const iconId   = parts[1];
            const kmlColor = parts[2];
            const key      = `${iconId}|${kmlColor}`;

            if (styleMap.has(key)) {
                styleMap.get(key).count++;
            } else {
                // Resolve the embedded image: styleUrl is a StyleMap id → lookup normal style
                const normalId = smNormal[styleUrl];
                const href     = (normalId && styleHref[normalId])
                                 || styleHref[styleUrl]
                                 || null;
                styleMap.set(key, { iconId, kmlColor, href, count: 1 });
            }
        });

        if (styleMap.size === 0) {
            section.classList.add("visible");
            label.innerHTML = `Icon conversion preview <span style="color:var(--text-muted);font-size:12px;">(no waypoints found)</span>`;
            return;
        }

        const sorted = [...styleMap.values()].sort((a, b) => a.iconId.localeCompare(b.iconId, undefined, {numeric: true}));
        for (const entry of sorted) {
            body.appendChild(buildRow(entry, imageBlobs));
        }
        /*
        for (const entry of styleMap.values()) {
            body.appendChild(buildRow(entry, imageBlobs));
        }
        */
        const total = [...styleMap.values()].reduce((s, v) => s + v.count, 0);
        label.innerHTML = `Icon conversion preview <span class="count-badge">${styleMap.size} style${styleMap.size > 1 ? "s" : ""} · ${total} waypoint${total > 1 ? "s" : ""}</span>`;
        section.classList.add("visible");

    } catch(e) {
        console.error("Preview error:", e);
        const isZipError = e.message?.includes("central directory") || e.message?.includes("zip");
        section.classList.add("visible");
        label.innerHTML = `Icon conversion preview`;
        body.innerHTML = `<tr><td colspan="4" style="padding:20px; color:var(--danger); font-family:var(--mono); font-size:13px;">
            ✗ ${isZipError ? "Not a valid KMZ file (must be a ZIP-based .kmz)" : e.message}
        </td></tr>`;
    }
}

// ── Icon picker ──────────────────────────────────────────────────────────────
const IP_API    = "https://api.github.com/repos/osmandapp/OsmAnd-resources/git/trees/master?recursive=1";
const IP_FOLDER = "rendering_styles/style-icons/poi-icons-png/drawable-hdpi/";
const IP_RAW    = "https://raw.githubusercontent.com/osmandapp/OsmAnd-resources/master/";

let _ipCache    = null;   // [{name, url}] fetched once
let _ipCards    = null;   // [{name, card}] DOM nodes created once, reused forever
let _ipCallback = null;
let _ipCurrent  = null;

async function fetchIconList() {
    if (_ipCache) return _ipCache;
    const r = await fetch(IP_API, { headers:{ Accept:"application/vnd.github+json" } });
    if (!r.ok) throw new Error(`GitHub API ${r.status}`);
    const { tree } = await r.json();
    _ipCache = tree
        .filter(i => i.type === "blob" && i.path.startsWith(IP_FOLDER) && i.path.endsWith(".png"))
        .map(i => {
            let name = i.path.slice(IP_FOLDER.length).replace(/\.png$/, "");
            if (name.startsWith("mx_")) name = name.slice(3);
            return { name, url: IP_RAW + i.path };
        })
        .sort((a, b) => a.name.localeCompare(b.name));
    return _ipCache;
}

function buildPickerCards(icons) {
    // Called once — creates all card DOM nodes and stores them
    _ipCards = icons.map(({ name, url }) => {
        const card = document.createElement("div");
        card.className = "ip-card";
        card.title = name;
        const img = document.createElement("img");
        img.src = url; img.alt = name; img.loading = "lazy";
        const lbl = document.createElement("span");
        lbl.textContent = name;
        card.appendChild(img);
        card.appendChild(lbl);
        card.addEventListener("click", () => {
            _ipCallback && _ipCallback(name);
            closeIconPicker();
        });
        return { name, card };
    });
    // Append all to grid once
    const grid = document.getElementById("iconPickerGrid");
    _ipCards.forEach(({ card }) => grid.appendChild(card));
}

function filterPickerCards(term) {
    // Just toggle visibility — no DOM create/destroy
    _ipCards.forEach(({ name, card }) => {
        card.style.display = (!term || name.includes(term)) ? "" : "none";
    });
}

async function openIconPicker(currentName, callback) {
    _ipCallback = callback;
    _ipCurrent  = currentName;
    const overlay = document.getElementById("iconPickerOverlay");
    const status  = document.getElementById("iconPickerStatus");
    const search  = document.getElementById("iconPickerSearch");
    search.value  = "";
    search.oninput = () => filterPickerCards(search.value.toLowerCase());
    overlay.classList.add("open");

    if (_ipCards) {
        // Cards already built — just reset filter and highlight current
        status.textContent = "";
        filterPickerCards("");
        _ipCards.forEach(({ name, card }) =>
            card.classList.toggle("selected", name === currentName));
        search.focus();
        setTimeout(() => {
            document.querySelector(".ip-card.selected")?.scrollIntoView({ block: "center" });
        }, 50);
        return;
    }

    status.textContent = "Loading icons…";
    try {
        const icons = await fetchIconList();
        status.textContent = "";
        buildPickerCards(icons);
        _ipCards.forEach(({ name, card }) =>
            card.classList.toggle("selected", name === currentName));
        search.focus();
        setTimeout(() => {
            document.querySelector(".ip-card.selected")?.scrollIntoView({ block: "center" });
        }, 50);
    } catch(e) {
        status.textContent = "Error: " + e.message;
    }
}

function closeIconPicker() {
    document.getElementById("iconPickerOverlay").classList.remove("open");
    _ipCallback = null;
}

// Close on Escape
document.addEventListener("keydown", e => { if (e.key === "Escape") closeIconPicker(); });

// ── buildRow ─────────────────────────────────────────────────────────────────
function buildRow({ iconId, kmlColor, href, count }, imageBlobs) {
    const key    = `${iconId}|${kmlColor}`;
    const safeId = `${iconId}-${kmlColor}`;
    const tr     = document.createElement("tr");
    tr.dataset.key = key;

    // ── Current values (override or default) ─────────────────────────────────
    const osm = getOsmand(iconId, kmlColor);

    // ── Google cell ───────────────────────────────────────────────────────────
    const blobUrl  = href ? imageBlobs[href] : null;
    const gImgHtml = blobUrl
        ? `<img src="${blobUrl}" width="40" height="40" style="image-rendering:auto;">`
        : `<div class="icon-img-placeholder">?</div>`;
    const gName = googleIconNames[iconId] || `id ${iconId}`;

    const tdGoogle = document.createElement("td");
    tdGoogle.innerHTML = `
        <div class="icon-cell">
          ${gImgHtml}
          <div class="icon-label">
            <div class="icon-name">${gName}</div>
            <div class="icon-sub">
              <span class="color-swatch" style="background:#${kmlColor};"></span>
              <span>#${kmlColor}</span>
              <span style="color:var(--border-light);">·</span>
              <span>id ${iconId}</span>
            </div>
          </div>
        </div>`;
    tr.appendChild(tdGoogle);

    // ── Arrow cell ────────────────────────────────────────────────────────────
    const tdArrow = document.createElement("td");
    tdArrow.className = "arrow-col";
    tdArrow.textContent = "→";
    tr.appendChild(tdArrow);

    // ── OsmAnd editable cell ──────────────────────────────────────────────────
    const tdOsm = document.createElement("td");

    // Live preview bubble
    const prevBg = document.createElement("div");
    prevBg.id = `prev-${safeId}`;
    prevBg.className = `osmand-bg shape-${osm.shape} pickable`;
    prevBg.style.background = `#${osm.color}`;
    const prevImg = document.createElement("img");
    prevImg.id = `prev-img-${safeId}`;
    prevImg.src = osmandIconUrl(osm.name);
    prevImg.width = 24; prevImg.height = 24;
    prevImg.onerror = function(){ this.outerHTML = '<span class="fallback-q">?</span>'; };
    prevBg.appendChild(prevImg);

    // Name input + reset button
    const nameInput = document.createElement("input");
    nameInput.type = "text";
    nameInput.className = "osm-name-input";
    nameInput.value = osm.name;

    const browseBtn = document.createElement("button");
    browseBtn.className = "osm-browse-btn";
    browseBtn.title = "Browse icons";
    browseBtn.textContent = "⊞";

    const resetBtn = document.createElement("button");
    resetBtn.className = "osm-reset-btn";
    resetBtn.title = "Reset to default";
    resetBtn.textContent = "↺";

    const nameRow = document.createElement("div");
    nameRow.className = "osm-name-row";
    nameRow.appendChild(nameInput);
    nameRow.appendChild(browseBtn);
    nameRow.appendChild(resetBtn);

    // Color picker + hex input
    const colorPicker = document.createElement("input");
    colorPicker.type = "color";
    colorPicker.className = "osm-colorpicker";
    colorPicker.value = `#${osm.color}`;

    const hexInput = document.createElement("input");
    hexInput.type = "text";
    hexInput.className = "osm-hex-input";
    hexInput.value = osm.color;
    hexInput.maxLength = 6;
    hexInput.spellcheck = false;

    const colorRow = document.createElement("div");
    colorRow.className = "osm-color-row";
    colorRow.appendChild(colorPicker);
    colorRow.appendChild(hexInput);

    // Shape buttons
    const shapeRow = document.createElement("div");
    shapeRow.className = "osm-shape-row";
    const shapes = ["circle", "square", "octagon"];
    const shapeBtns = shapes.map(s => {
        const b = document.createElement("button");
        b.className = "osm-shape-btn" + (s === osm.shape ? " active" : "");
        b.dataset.shape = s;
        b.textContent = s;
        shapeRow.appendChild(b);
        return b;
    });

    // Controls wrapper
    const controls = document.createElement("div");
    controls.className = "osm-controls";
    controls.appendChild(nameRow);
    controls.appendChild(colorRow);
    controls.appendChild(shapeRow);

    // Outer wrap
    const wrap = document.createElement("div");
    wrap.className = "osm-edit-wrap";
    wrap.appendChild(prevBg);
    wrap.appendChild(controls);
    tdOsm.appendChild(wrap);
    tr.appendChild(tdOsm);

    // ── Count cell ────────────────────────────────────────────────────────────
    const tdCount = document.createElement("td");
    tdCount.style.cssText = "text-align:right; padding-right:16px;";
    tdCount.innerHTML = `<span class="count-badge">${count}</span>`;
    tr.appendChild(tdCount);

    // ── Helper: read current state & push to userOverrides ───────────────────
    function applyOverride() {
        const def = getDefaultOsmand(iconId, kmlColor);
        const cur = {
            name:  nameInput.value.trim() || def.name,
            color: hexInput.value,
            shape: shapeBtns.find(b => b.classList.contains("active"))?.dataset.shape || def.shape
        };
        const isDefault = cur.name === def.name && cur.color === def.color && cur.shape === def.shape;
        if (isDefault) {
            delete userOverrides[key];
            tr.classList.remove("overridden");
        } else {
            userOverrides[key] = cur;
            tr.classList.add("overridden");
        }
        // update live preview
        const bg = document.getElementById(`prev-${safeId}`);
        if (bg) {
            bg.className = `osmand-bg shape-${cur.shape} pickable`;
            bg.style.background = `#${cur.color}`;
            const img = document.getElementById(`prev-img-${safeId}`);
            if (img) img.src = osmandIconUrl(cur.name);
        }
    }

    // ── Event listeners ───────────────────────────────────────────────────────
    function openPicker() {
        openIconPicker(nameInput.value.trim(), selectedName => {
            nameInput.value = selectedName;
            applyOverride();
        });
    }
    prevBg.addEventListener("click", openPicker);
    browseBtn.addEventListener("click", openPicker);

    nameInput.addEventListener("input", applyOverride);

    colorPicker.addEventListener("input", () => {
        const hex = colorPicker.value.slice(1).toLowerCase();
        hexInput.value = hex;
        hexInput.classList.remove("invalid");
        applyOverride();
    });

    hexInput.addEventListener("input", () => {
        const val = hexInput.value.replace(/[^0-9a-fA-F]/g, "").slice(0, 6);
        hexInput.value = val;
        if (val.length === 6) {
            colorPicker.value = `#${val}`;
            hexInput.classList.remove("invalid");
            applyOverride();
        } else {
            hexInput.classList.add("invalid");
        }
    });

    shapeBtns.forEach(btn => {
        btn.addEventListener("click", () => {
            shapeBtns.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            applyOverride();
        });
    });

    resetBtn.addEventListener("click", () => {
        const def = getDefaultOsmand(iconId, kmlColor);
        nameInput.value    = def.name;
        colorPicker.value  = `#${def.color}`;
        hexInput.value     = def.color;
        hexInput.classList.remove("invalid");
        shapeBtns.forEach(b => b.classList.toggle("active", b.dataset.shape === def.shape));
        delete userOverrides[key];
        tr.classList.remove("overridden");
        applyOverride();
    });

    return tr;
}

// ── Utilities ────────────────────────────────────────────────────────────────
function html_escape(text){
    return text.replace(/[&"'<>]/g, c => ({
        "&":"&amp;",'"':"&quot;","'":"&apos;",">":"&gt;","<":"&lt;"
    })[c]);
}

function showStatus(message, type = 'success') {
    const status = document.getElementById('status');
    status.textContent = message;
    status.className = `status ${type}`;
    status.style.display = 'block';
    setTimeout(() => { status.style.display = 'none'; }, 5000);
}

// ── Converter (unchanged logic) ──────────────────────────────────────────────
async function convert(){
    const status = document.getElementById('status');
    status.style.display = 'none';

    const file = document.getElementById("fileInput").files[0];
    if(!file) {
        showStatus("Please select a KMZ file first.", "error");
        return;
    }

    try {
        const fileName = file.name.slice(0, -4);
        status.textContent = "Converting...";
        status.className = "status";
        status.style.display = 'block';

        const zip = await JSZip.loadAsync(file);
        const kmlText = await zip.file("doc.kml").async("text");
        const xml = new DOMParser().parseFromString(kmlText,"text/xml");

        let out = `<?xml version='1.0' encoding='UTF-8' standalone='yes' ?>
<gpx version="1.1" creator="OsmAnd+ 3.9.10"
xmlns="http://www.topografix.com/GPX/1/1"
xmlns:osmand="https://osmand.net">\n`;

        const docName = xml.querySelector("Document > name");
        if(docName){
out += "<metadata>\n";
out += "\t<name>"+html_escape(docName.textContent)+"</name>\n";
out += "</metadata>\n";
        }

        xml.querySelectorAll("Placemark").forEach(pm=>{
let name = html_escape(pm.querySelector("name")?.textContent.trim() || "");
let desc = html_escape((pm.querySelector("description")?.innerHTML || "").replace(/<br>/g,"\r\n"));
            let style = pm.querySelector("styleUrl")?.textContent || "";
            let coordsRaw = pm.querySelector("coordinates")?.textContent || "";

let coords = coordsRaw.trim().replace(/ /g,"").replace(/\n/g,",").split(",");

            if(pm.querySelector("LineString")){
out += "<trk>\n";
out += "\t<name>"+name+"</name>\n";
if(desc) out += "\t<desc>"+desc+"</desc>\n";
out += "\t<trkseg>\n";

                for(let i=0;i<coords.length;i+=3){
out += `\t\t<trkpt lat="${coords[i+1]}" lon="${coords[i]}"/>\n`;
                }

out += "\t</trkseg>\n";

                let styleParts = style.split("-");
                let styleWidth = parseFloat(styleParts[2])/1000;
                let styleColor = styleParts[1];

out += "\t<extensions>\n";
out += `\t\t<osmand:color>#${TrackTransparency}${styleColor}</osmand:color>\n`;
out += `\t\t<width>${styleWidth}</width>\n`;
out += "\t\t<opacity>1</opacity>\n";
out += "\t</extensions>\n";
out += "</trk>\n";

            } else {

out += `<wpt lat="${coords[1]}" lon="${coords[0]}">\n`;
out += "\t<name>"+name+"</name>\n";
if(desc) out += "\t<desc>"+desc+"</desc>\n";

                let styleParts = style.split("-");
                let styleIcon = styleParts[1];
                let styleColor = styleParts[2];

                const osm = getOsmand(styleIcon, styleColor);

out += "\t<extensions>\n";
out += `\t\t<osmand:color>#${osm.color}</osmand:color>\n`;
out += `\t\t<osmand:icon>${osm.name}</osmand:icon>\n`;
out += `\t\t<osmand:background>${osm.shape}</osmand:background>\n`;
out += "\t</extensions>\n";

out += "</wpt>\n";
            }
        });

        out += "</gpx>";

        download(fileName+".gpx", out);
        showStatus(`✓ Converted ${file.name} → ${fileName}.gpx`, "success");

    } catch (error) {
        console.error(error);
        showStatus("Error: " + error.message, "error");
    }
}

function download(name, text){
    const blob = new Blob([text], {type:"application/gpx+xml"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}
